<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hi 102</title>
  <style>
    :root {
      color-scheme: light;
      --bg-top: #fff8e7;
      --bg-bottom: #ffd9b8;
      --card: rgba(255, 255, 255, 0.88);
      --border: rgba(89, 54, 24, 0.16);
      --text: #2f241d;
      --accent: #c45c2f;
      --accent-dark: #8f3d1c;
      --shadow: 0 24px 60px rgba(100, 54, 22, 0.18);
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.7), transparent 35%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
    }

    main {
      width: min(720px, calc(100vw - 32px));
      padding: 32px;
      border: 1px solid var(--border);
      border-radius: 28px;
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0 0 20px;
      font-size: clamp(4rem, 12vw, 7rem);
      line-height: 0.95;
      letter-spacing: -0.06em;
      text-align: center;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 24px;
      background: rgba(255, 255, 255, 0.72);
      border-radius: 16px;
      overflow: hidden;
    }

    th,
    td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    th {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent-dark);
      background: rgba(196, 92, 47, 0.08);
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    form {
      display: grid;
      gap: 12px;
    }

    label {
      font-size: 0.95rem;
      font-weight: 700;
    }

    .form-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    input {
      flex: 1 1 260px;
      padding: 14px 16px;
      font: inherit;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.95);
    }

    button {
      padding: 14px 20px;
      font: inherit;
      font-weight: 700;
      color: white;
      background: linear-gradient(180deg, var(--accent), var(--accent-dark));
      border: none;
      border-radius: 14px;
      cursor: pointer;
    }

    @media (max-width: 600px) {
      main {
        padding: 24px;
      }

      .form-row {
        flex-direction: column;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Hi 102</h1>

    <table>
      <thead>
        <tr>
          <th>Usernames</th>
        </tr>
      </thead>
      <tbody>
        <!-- USER_ROWS -->
      </tbody>
    </table>

    <form method="POST" action="/users">
      <label for="newuser">Add a new user</label>
      <div class="form-row">
        <input id="newuser" name="newuser" type="text" placeholder="Enter a username" required>
        <button type="submit">Submit</button>
      </div>
    </form>
  </main>
</body>
</html>
